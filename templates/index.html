<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Σταυρόλεξο</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      font-size: 20px;
      line-height: 1.5;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .panel {
      width: min(580px, 100%);
      background: #fff;
      color: #000;
      border: 4px solid #000;
      border-radius: 12px;
      padding: 32px;
    }

    h1 {
      margin: 0 0 28px;
      font-size: 36px;
      font-weight: 800;
      text-align: center;
    }

    label {
      display: block;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    select {
      width: 100%;
      font-size: 22px;
      font-weight: 600;
      padding: 14px 16px;
      border: 3px solid #000;
      border-radius: 8px;
      margin-bottom: 28px;
      background: #fff;
      color: #000;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    button {
      font-size: 22px;
      font-weight: 800;
      padding: 18px 20px;
      border: 3px solid #000;
      border-radius: 10px;
      cursor: pointer;
      background: #000;
      color: #fff;
    }

    button:hover:not(:disabled) {
      background: #222;
    }

    button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    button.secondary {
      background: #fff;
      color: #000;
    }

    button.secondary:hover:not(:disabled) {
      background: #eee;
    }

    button.danger {
      background: #8b0000;
      border-color: #8b0000;
      color: #fff;
    }

    #status {
      margin-top: 24px;
      padding: 16px;
      border: 3px solid #000;
      border-radius: 8px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      background: #f5f5f5;
    }

    #status.ok { background: #e8ffe8; }
    #status.busy { background: #fff8e1; }
    #status.error { background: #ffe8e8; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Σταυρόλεξο</h1>

    <label for="size">Μέγεθος πλέγματος</label>
    <select id="size" aria-label="Μέγεθος πλέγματος">
      <option value="7" selected>7×7</option>
      <option value="8">8×8</option>
      <option value="10">10×10</option>
      <option value="12">12×12</option>
      <option value="15">15×15</option>
    </select>

    <div class="actions">
      <button type="button" id="btn-generate">🔄 Δημιουργία νέου σταυρόλεξου</button>
      <button type="button" id="btn-print" class="secondary">🖨️ Άνοιγμα για εκτύπωση</button>
      <button type="button" id="btn-shutdown" class="danger">✕ Κλείσιμο</button>
    </div>

    <div id="status" class="ok" role="status" aria-live="polite">Έτοιμο</div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const sizeEl = document.getElementById("size");
    const buttons = document.querySelectorAll("button");

    function setStatus(text, kind) {
      statusEl.textContent = text;
      statusEl.className = kind || "ok";
    }

    function setBusy(busy) {
      buttons.forEach((btn) => { btn.disabled = busy; });
      if (busy) setStatus("Δημιουργία...", "busy");
    }

    document.getElementById("btn-generate").addEventListener("click", async () => {
      setBusy(true);
      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ size: Number(sizeEl.value), mode: "new" }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Αποτυχία δημιουργίας");
        }
        setStatus(`Έτοιμο — ${data.words} λέξεις, πλέγμα ${data.size}×${data.size}`, "ok");
      } catch (err) {
        setStatus(`Σφάλμα: ${err.message}`, "error");
      } finally {
        buttons.forEach((btn) => { btn.disabled = false; });
      }
    });

    document.getElementById("btn-print").addEventListener("click", () => {
      window.open("/preview", "_blank");
    });

    document.getElementById("btn-shutdown").addEventListener("click", async () => {
      if (!confirm("Να κλείσει ο τοπικός server;")) return;
      setStatus("Κλείσιμο...", "busy");
      try {
        await fetch("/shutdown");
      } catch (_) {
        /* connection may drop as server stops */
      }
      setStatus("Ο server έκλεισε. Μπορείτε να κλείσετε αυτή την καρτέλα.", "ok");
    });
  </script>
</body>
</html>
