<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ css_href }}">
  <style>
    :root {
      --grid-size-mm: {{ grid_mm }}mm;
    }
  </style>
</head>
<body>
  <section class="page page-grid" aria-label="Σελίδα πλέγματος">
    <h1 class="visually-hidden">{{ title }} — Πλέγμα</h1>
    {% if helper %}
    <p class="helper-note">Μία λέξη δίνεται στο πλέγμα ως βοήθεια (γκρι κελιά).</p>
    {% endif %}
    <div class="grid-wrap">
      {{ grid_svg | safe }}
    </div>
  </section>

  <section class="page page-words {{ words_layout_class }}" aria-label="Σελίδα λέξεων">
    <h1 class="words-title">Λέξεις ({{ total_words }})</h1>
    {% for group in word_groups %}
    <div class="word-group">
      <h2>{{ group.length }} γράμματα</h2>
      <ul class="word-list">
        {% for word in group.words %}
        <li>{{ word }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endfor %}
  </section>
</body>
</html>
